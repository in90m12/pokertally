<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="poker">
<meta name="theme-color" content="#0a0f0d">
<title>♠ 德州撲克結算器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',-apple-system,'Segoe UI',sans-serif;background:#0a0f0d;color:#e8e6e3;overflow-x:hidden}
input{font-family:inherit}
input[type="text"]:focus{border-color:#2ecc71!important}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.stats-overlay{padding-top:max(20px, calc(env(safe-area-inset-top, 0px) + 20px))!important}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const DEFAULT_CHIP_RATE = 100;
const DEFAULT_BUY_IN_CASH = 500;

// ── 內建預設名單（在這裡修改）──
const PRESET_MEMBERS = [
  "Charlie", "Frank", "Harry", "Jimmy", "Marcus", "Morse",
  "上豪", "大頭", "濬紘", "小柏", "小wei", "文文",
  "牙醫Mike", "阿元", "阿文", "葳葳", "賈丁", "銀行Mike", "慶慶",
];

function formatChips(n) { return n.toLocaleString(); }
function formatCash(n) { return `$${n.toLocaleString()}`; }
function nameSort(a, b) {
  const isAscii = (s) => s.charCodeAt(0) <= 0x7f;
  const aA = isAscii(a), bA = isAscii(b);
  if (aA && !bA) return -1;
  if (!aA && bA) return 1;
  if (!aA && !bA) return a.localeCompare(b, "zh-TW-u-co-stroke");
  return a.localeCompare(b, "en");
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const theme = {
  bg: "#0a0f0d", card: "#141e19", cardAlt: "#1a2a22",
  accent: "#2ecc71", red: "#e74c3c", gold: "#f1c40f",
  text: "#e8e6e3", textDim: "#7a8a80", border: "#2a3a30", purple: "#9b59b6",
};

const S = {
  input: { background: "rgba(0,0,0,0.3)", border: `1px solid ${theme.border}`, borderRadius: "6px", color: theme.text, padding: "8px 12px", fontSize: "14px", outline: "none", width: "100%" },
  chipInput: { background: "rgba(0,0,0,0.3)", border: `1px solid ${theme.border}`, borderRadius: "6px", color: theme.gold, padding: "8px 10px", fontSize: "14px", outline: "none", width: "100px", textAlign: "right", fontWeight: 600 },
  card: { background: theme.card, border: `1px solid ${theme.border}`, borderRadius: "12px", padding: "20px", marginBottom: "16px" },
  row: { display: "flex", alignItems: "center", gap: "10px", padding: "10px 12px", borderRadius: "8px", marginBottom: "6px", background: theme.cardAlt },
  section: { fontSize: "14px", fontWeight: 600, textTransform: "uppercase", letterSpacing: "2px", color: theme.accent, marginBottom: "16px" },
  btn: (c = theme.accent, o = false) => ({ background: o ? "transparent" : c, color: o ? c : (c === theme.gold ? "#000" : "#fff"), border: o ? `1.5px solid ${c}` : "none", borderRadius: "8px", padding: "10px 20px", fontSize: "14px", fontWeight: 600, cursor: "pointer", letterSpacing: "0.5px" }),
  sm: (c = theme.textDim) => ({ background: "transparent", color: c, border: `1px solid ${c}33`, borderRadius: "6px", padding: "4px 10px", fontSize: "12px", cursor: "pointer" }),
  badge: (c) => ({ background: `${c}22`, color: c, padding: "2px 8px", borderRadius: "4px", fontSize: "12px", fontWeight: 600 }),
  rbtn: { width: "36px", height: "36px", borderRadius: "50%", border: `1px solid ${theme.border}`, background: "rgba(0,0,0,0.3)", color: theme.text, fontSize: "20px", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", lineHeight: 1 },
};

function App() {
  const [clubMembers, setClubMembers] = useState([]);
  const [clubLoaded, setClubLoaded] = useState(false);
  const [showPresetPrompt, setShowPresetPrompt] = useState(false);
  const [newName, setNewName] = useState("");
  const [editId, setEditId] = useState(null);
  const [editName, setEditName] = useState("");
  const nextId = useRef(1);

  const importPreset = () => {
    const existing = new Set(clubMembers.map(m => m.name));
    const toAdd = PRESET_MEMBERS.filter(n => !existing.has(n));
    if (toAdd.length === 0) { setShowPresetPrompt(false); return; }
    let nid = nextId.current;
    const newMembers = toAdd.map(name => ({ id: nid++, name }));
    const u = [...clubMembers, ...newMembers];
    nextId.current = nid;
    setClubMembers(u); saveClub(u, nid);
    setShowPresetPrompt(false);
  };

  const [selectedIds, setSelectedIds] = useState([]);
  const [rounds, setRounds] = useState(() => {
    try { return JSON.parse(localStorage.getItem("poker-rounds")) || []; } catch { return []; }
  });
  const [currentRound, setCurrentRound] = useState(() => {
    try { return JSON.parse(localStorage.getItem("poker-current")); } catch { return null; }
  });
  const [view, setView] = useState(() => {
    try { const cr = JSON.parse(localStorage.getItem("poker-current")); const rds = JSON.parse(localStorage.getItem("poker-rounds")); return cr ? "round" : (rds && rds.length > 0 ? "summary" : "club"); } catch { return "club"; }
  });

  const [seatDealers, setSeatDealers] = useState([]);
  const [seatResult, setSeatResult] = useState(null);
  const [seatAnim, setSeatAnim] = useState(false);
  const [venueFee, setVenueFee] = useState(false);
  const [toast, setToast] = useState("");
  const [isCapturing, setIsCapturing] = useState(false);
  const summaryRef = useRef(null);
  const statsRef = useRef(null);

  // ── Hidden Stats (record-based with dates) ──
  const [showStats, setShowStats] = useState(false);
  const [statsSortBy, setStatsSortBy] = useState("avg");
  const [statsDateFrom, setStatsDateFrom] = useState("");
  const [statsDateTo, setStatsDateTo] = useState("");
  const [showStatsImport, setShowStatsImport] = useState(false);
  const [statsImportText, setStatsImportText] = useState("");
  const loadStats = () => { try { return JSON.parse(localStorage.getItem("poker-stats")) || []; } catch { return []; } };
  const saveStats = (s) => { try { localStorage.setItem("poker-stats", JSON.stringify(s)); } catch {} };
  const todayStr = () => new Date().toISOString().slice(0, 10);
  const accumulateStats = (settledRound) => {
    const records = loadStats();
    const date = todayStr();
    settledRound.players.forEach(p => {
      if (!p.active) return;
      records.push({ date, name: p.name, cash: p.profitCash });
    });
    saveStats(records);
  };
  const removeStatsForRound = (round) => {
    const records = loadStats();
    const toRemove = round.players.filter(p => p.active).map(p => ({ name: p.name, cash: p.profitCash }));
    const updated = [...records];
    toRemove.forEach(tr => {
      const idx = updated.findIndex(r => r.name === tr.name && r.cash === tr.cash);
      if (idx !== -1) updated.splice(idx, 1);
    });
    saveStats(updated);
  };
  const aggregateStats = (records) => {
    const map = {};
    records.forEach(r => {
      if (!map[r.name]) map[r.name] = { name: r.name, totalCash: 0, rounds: 0, dates: new Set() };
      map[r.name].totalCash += r.cash;
      map[r.name].rounds += 1;
      map[r.name].dates.add(r.date);
    });
    return Object.values(map).map(d => ({ ...d, sessions: d.dates.size, avg: d.dates.size > 0 ? Math.round(d.totalCash / d.dates.size) : 0 }));
  };

  const captureAndShare = async (ref, filename) => {
    if (!ref.current) return;
    setToast("capturing");
    setIsCapturing(true);
    await new Promise(r => setTimeout(r, 200));
    try {
      const el = ref.current;
      const allEls = el.querySelectorAll("*");
      const saved = new Map();
      allEls.forEach(e => {
        const s = e.style;
        const cs = s.cssText;
        let changed = false;
        if (s.overflow === "hidden" || s.overflowX === "auto" || s.overflowX === "hidden") {
          s.overflow = "visible"; s.overflowX = "visible"; changed = true;
        }
        if (s.maxWidth) { s.maxWidth = "none"; changed = true; }
        if (s.position === "sticky") { s.position = "relative"; changed = true; }
        if (changed) saved.set(e, cs);
      });

      await new Promise(r => setTimeout(r, 50));
      const w = Math.max(el.scrollWidth + 40, 500);
      const canvas = await html2canvas(el, { backgroundColor: "#0a0f0d", scale: 1.5, useCORS: true, logging: false, scrollX: 0, scrollY: 0, width: w, windowWidth: w });

      saved.forEach((css, e) => { e.style.cssText = css; });
      setIsCapturing(false);

      canvas.toBlob(async (blob) => {
        if (!blob) { setToast("error"); setTimeout(() => setToast(""), 2000); return; }
        if (navigator.share && navigator.canShare) {
          const file = new File([blob], filename, { type: "image/png" });
          const sd = { files: [file] };
          try {
            if (navigator.canShare(sd)) { await navigator.share(sd); setToast(""); return; }
          } catch (e) { if (e.name !== "AbortError") { setToast("error"); setTimeout(() => setToast(""), 2000); return; } setToast(""); return; }
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        setToast("");
      }, "image/png");
    } catch (e) { console.error(e); setIsCapturing(false); setToast("error"); setTimeout(() => setToast(""), 2000); }
  };
  const shareImage = () => captureAndShare(summaryRef, "poker-result.png");
  const shareStatsImage = () => captureAndShare(statsRef, "poker-stats.png");


  const [chipRate, setChipRate] = useState(() => {
    try { const d = JSON.parse(localStorage.getItem("poker-settings")); return d?.chipRate || DEFAULT_CHIP_RATE; } catch { return DEFAULT_CHIP_RATE; }
  });
  const [buyInCash, setBuyInCash] = useState(() => {
    try { const d = JSON.parse(localStorage.getItem("poker-settings")); return d?.buyInCash || DEFAULT_BUY_IN_CASH; } catch { return DEFAULT_BUY_IN_CASH; }
  });
  const [venueFeeAmt, setVenueFeeAmt] = useState(() => {
    try { const d = JSON.parse(localStorage.getItem("poker-settings")); return d?.venueFeeAmt || 10; } catch { return 10; }
  });
  const buyInChips = buyInCash * chipRate;
  const saveSettings = (rate, cash, fee) => {
    try { localStorage.setItem("poker-settings", JSON.stringify({ chipRate: rate, buyInCash: cash, venueFeeAmt: fee })); } catch {}
  };

  useEffect(() => {
    try {
      const d = JSON.parse(localStorage.getItem("poker-club"));
      if (d) { setClubMembers(d.members || []); nextId.current = d.nextId || 1; }
      else if (PRESET_MEMBERS.length > 0) { setShowPresetPrompt(true); }
    } catch {}
    setClubLoaded(true);
  }, []);

  const saveClub = (members, nid) => {
    try { localStorage.setItem("poker-club", JSON.stringify({ members, nextId: nid })); } catch {}
  };

  // ── Persist game state ──
  useEffect(() => {
    try { localStorage.setItem("poker-rounds", JSON.stringify(rounds)); } catch {}
  }, [rounds]);
  useEffect(() => {
    try { if (currentRound) localStorage.setItem("poker-current", JSON.stringify(currentRound)); else localStorage.removeItem("poker-current"); } catch {}
  }, [currentRound]);

  // Auto-migrate old stats format or recalculate from rounds
  useEffect(() => {
    const raw = localStorage.getItem("poker-stats");
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed) && typeof parsed === "object") {
          // Old format: {name: {totalCash, rounds, sessions}} → convert to records with date 2026-03-11
          const records = [];
          Object.entries(parsed).forEach(([name, d]) => {
            for (let i = 0; i < (d.rounds || 1); i++) {
              records.push({ date: "2026-03-11", name, cash: (d.totalCash || 0) / (d.rounds || 1) });
            }
          });
          saveStats(records);
          localStorage.removeItem("poker-stats-session");
        }
      } catch {}
      return;
    }
    // No stats at all: rebuild from existing rounds
    if (rounds.length === 0) return;
    const records = [];
    const date = todayStr();
    rounds.forEach(r => {
      r.players.forEach(p => {
        if (!p.active) return;
        records.push({ date, name: p.name, cash: p.profitCash });
      });
    });
    saveStats(records);
  }, []);

  const addMember = () => {
    const n = newName.trim();
    if (!n) return;
    const id = nextId.current++;
    const u = [...clubMembers, { id, name: n }];
    setClubMembers(u); setNewName(""); saveClub(u, nextId.current);
  };
  const removeMember = (id) => {
    const u = clubMembers.filter(m => m.id !== id);
    setClubMembers(u); setSelectedIds(p => p.filter(x => x !== id)); saveClub(u, nextId.current);
  };
  const startEdit = (m) => { setEditId(m.id); setEditName(m.name); };
  const confirmEdit = () => {
    const n = editName.trim(); if (!n) return;
    const u = clubMembers.map(m => m.id === editId ? { ...m, name: n } : m);
    setClubMembers(u); setEditId(null); saveClub(u, nextId.current);
  };

  const toggleSelect = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

  const startNewRound = () => {
    if (currentRound && !confirm("目前有進行中的牌局，確定要放棄並開始新局嗎？")) return;
    const sel = clubMembers.filter(m => selectedIds.includes(m.id));
    const rd = { id: rounds.length + 1, players: sel.map(p => ({ ...p, rebuys: 0, finalChips: "", active: true })), settled: false };
    setCurrentRound(rd); setSeatResult(null); setSeatDealers([]); setEditingRoundIdx(null); setView("round");
  };


  const addPlayerMidRound = (member) => {
    setCurrentRound(r => ({
      ...r, players: [...r.players, { ...member, rebuys: 0, finalChips: "", active: true }]
    }));
  };
  const [midRoundNewName, setMidRoundNewName] = useState("");
  const addNewPlayerMidRound = () => {
    const n = midRoundNewName.trim();
    if (!n) return;
    const id = nextId.current++;
    const newMember = { id, name: n };
    const u = [...clubMembers, newMember];
    setClubMembers(u); saveClub(u, nextId.current);
    addPlayerMidRound(newMember);
    setMidRoundNewName("");
  };
  const removePlayerMidRound = (pid) => {
    if (!confirm("確定要移除此玩家？")) return;
    setCurrentRound(r => ({ ...r, players: r.players.filter(p => p.id !== pid) }));
  };

  // ── Transfer (export/import game data) ──
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState("");
  const exportGameData = async () => {
    const data = JSON.stringify({ rounds, currentRound, ts: Date.now() });
    try { await navigator.clipboard.writeText(data); setToast("exported"); setTimeout(() => setToast(""), 2000); } catch { setToast("error"); setTimeout(() => setToast(""), 2000); }
  };
  const importGameData = () => {
    try {
      const data = JSON.parse(importText.trim());
      if (!data.rounds || !Array.isArray(data.rounds)) { alert("資料格式錯誤"); return; }
      if (!confirm("匯入會覆蓋目前的牌局紀錄，確定嗎？")) return;
      setRounds(data.rounds);
      setCurrentRound(data.currentRound || null);
      setEditingRoundIdx(null);
      setView(data.currentRound ? "round" : data.rounds.length > 0 ? "summary" : "club");
      setShowImport(false); setImportText("");
      setToast("imported"); setTimeout(() => setToast(""), 2000);
    } catch { alert("資料格式錯誤，請確認貼上的內容"); }
  };

  const totalRoundRebuys = currentRound ? currentRound.players.filter(p => p.active).reduce((s, p) => s + p.rebuys, 0) : 0;

  const setRebuys = (pid, delta) => {
    setCurrentRound(r => {
      const pl = r.players.find(p => p.id === pid); if (!pl) return r;
      const nv = pl.rebuys + delta; if (nv < 0) return r;
      return { ...r, players: r.players.map(p => p.id === pid ? { ...p, rebuys: nv } : p) };
    });
  };

  const setFinalChips = (pid, val) => setCurrentRound(r => ({ ...r, players: r.players.map(p => p.id === pid ? { ...p, finalChips: val } : p) }));
  const [editingRoundIdx, setEditingRoundIdx] = useState(null);

  const editRound = (idx) => {
    if (currentRound && !confirm("目前有進行中的牌局，確定要放棄並修改第 " + (idx + 1) + " 局嗎？")) return;
    const r = rounds[idx];
    const editable = { ...r, settled: false, players: r.players.map(p => ({ ...p, finalChips: String(p.finalChips || 0) })) };
    setCurrentRound(editable);
    setEditingRoundIdx(idx);
    setView("round");
  };

  const ap = currentRound ? currentRound.players.filter(p => p.active) : [];
  const totalPool = ap.reduce((s, p) => s + (1 + p.rebuys) * buyInChips, 0);
  const totalFinal = ap.reduce((s, p) => s + (parseInt(p.finalChips) || 0), 0);
  const balanced = totalFinal === totalPool;
  const diff = totalFinal - totalPool;

  const settleRound = () => {
    if (!balanced) return;
    const settled = { ...currentRound, settled: true, players: currentRound.players.map(p => ({
      ...p, finalChips: p.active ? (parseInt(p.finalChips) || 0) : 0,
      profit: p.active ? ((parseInt(p.finalChips) || 0) - (1 + p.rebuys) * buyInChips) : 0,
      profitCash: p.active ? (((parseInt(p.finalChips) || 0) - (1 + p.rebuys) * buyInChips) / chipRate) : 0,
    }))};
    if (editingRoundIdx !== null) {
      const oldRound = rounds[editingRoundIdx];
      removeStatsForRound(oldRound);
      accumulateStats(settled);
      const updated = [...rounds];
      updated[editingRoundIdx] = settled;
      setRounds(updated);
      setEditingRoundIdx(null);
    } else {
      accumulateStats(settled);
      setRounds([...rounds, settled]);
    }
    setCurrentRound(null); setView("summary");
  };

  const resetAll = () => { if (!confirm("確定要重置所有紀錄嗎？")) return; setRounds([]); setCurrentRound(null); setEditingRoundIdx(null); setVenueFee(false); try { localStorage.removeItem("poker-rounds"); localStorage.removeItem("poker-current"); } catch {} setView("setup"); };

  // ── Seat Draw ──
  const openSeatDraw = () => { if (!seatResult) { setSeatDealers([]); setSeatAnim(false); } setView("seatDraw"); };
  const toggleDealer = (pid) => setSeatDealers(p => p.includes(pid) ? p.filter(x => x !== pid) : p.length < 2 ? [...p, pid] : p);

  const runSeatDraw = () => {
    if (seatDealers.length !== 2) return;
    setSeatAnim(true);
    setTimeout(() => {
      const rp = currentRound ? currentRound.players.filter(p => p.active) : [];
      const dp = rp.filter(p => seatDealers.includes(p.id));
      const nd = rp.filter(p => !seatDealers.includes(p.id));
      const sd = shuffle(dp);
      const leftS = shuffle([1,2,3,4]);
      const rightS = shuffle([6,7,8,9]);
      const h1 = Math.ceil(nd.length / 2), h2 = nd.length - h1;
      const lc = Math.random() < 0.5 ? h1 : h2;
      const rs = [...leftS.slice(0, lc), ...rightS.slice(0, nd.length - lc)];
      const sn = shuffle(nd);
      const seats = [];
      sd.forEach((p, i) => seats.push({ seat: [5,10][i], player: p, isDealer: true, isButton: false }));
      sn.forEach((p, i) => seats.push({ seat: rs[i], player: p, isDealer: false, isButton: false }));
      const bi = Math.floor(Math.random() * seats.length);seats[bi].isButton = true;
      seats.sort((a, b) => a.seat - b.seat);
      setSeatResult({ seats }); setSeatAnim(false);
    }, 1200);
  };

  if (!clubLoaded) return (
    <div style={{ minHeight: "100vh", background: theme.bg, color: theme.text, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Noto Sans TC', sans-serif" }}>
      <p style={{ color: theme.textDim }}>載入中...</p>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(160deg, ${theme.bg} 0%, #0d1a14 50%, #0a1510 100%)`, color: theme.text, fontFamily: "'Noto Sans TC', 'Segoe UI', sans-serif" }}>
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", background: `radial-gradient(ellipse at 30% 20%, rgba(46,204,113,0.04) 0%, transparent 60%), radial-gradient(ellipse at 70% 80%, rgba(241,196,15,0.03) 0%, transparent 60%)` }} />

      {/* Top bar */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px", paddingTop: "max(16px, env(safe-area-inset-top, 16px))", borderBottom: `1px solid ${theme.border}`, background: "rgba(10,15,13,0.8)", backdropFilter: "blur(10px)", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px", fontSize: "18px", fontWeight: 700, letterSpacing: "1px" }}>
          <span style={{ fontSize: "24px", cursor: "pointer", padding: "4px" }} onClick={() => setShowStats(true)}>♠</span><span style={{ padding: "4px 0" }}>德州撲克結算器</span>
        </div>
        <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
          {rounds.length > 0 && <span style={S.badge(theme.accent)}>已完成 {rounds.length} 局</span>}
          {view !== "club" && <button style={S.sm(theme.textDim)} onClick={() => setView("club")}>👥 成員</button>}
          {(view === "round" || view === "seatDraw") && <button style={S.sm(theme.textDim)} onClick={() => setView("setup")}>⚙ 設定</button>}
          {rounds.length > 0 && view !== "summary" && <button style={S.sm(theme.gold)} onClick={() => setView("summary")}>📊 總結</button>}

            <div style={{ display: "flex", gap: "10px" }}>
              <button style={{ ...S.btn(theme.purple, true), flex: 1, padding: "12px" }} onClick={() => { setSeatResult(null); setSeatDealers([]); }}>重新抽位</button>
              <button style={{ ...S.btn(theme.accent), flex: 1, padding: "12px" }} onClick={() => setView("round")}>返回牌局</button>
            </div>
          </>)}
        </>)}


        {/* ═══ SUMMARY ═══ */}
        {view === "summary" && (<>
          <div ref={summaryRef} style={{ background: "#0a0f0d", padding: "4px 0" }}>
          <div style={{ marginBottom: "20px" }}>
            <h2 style={{ fontSize: "22px", fontWeight: 700, marginBottom: "4px" }}>今日總結</h2>
            <p style={{ color: theme.textDim, fontSize: "13px", margin: 0 }}>{new Date().toLocaleDateString("zh-TW", { month: "long", day: "numeric" })} · 共 {rounds.length} 局</p>
          </div>

          {!isCapturing && <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", background: theme.card, border: `1px solid ${venueFee ? theme.accent + "44" : theme.border}`, borderRadius: "10px", marginBottom: "14px" }}>
            <div style={{ fontSize: "13px", fontWeight: 600 }}>🏠 場地費</div>
            {venueFee && (
              <div style={{ display: "flex", alignItems: "center", gap: "4px" }}>
                <span style={{ fontSize: "11px", color: theme.textDim }}>每人每局</span>
                <span style={{ color: theme.textDim, fontSize: "12px" }}>$</span>
                <input type="text" inputMode="numeric" style={{ ...S.input, width: "48px", textAlign: "right", fontWeight: 600, color: theme.gold, padding: "3px 6px", fontSize: "13px" }} value={venueFeeAmt} onChange={e => { const v = parseInt(e.target.value) || 0; setVenueFeeAmt(v); saveSettings(chipRate, buyInCash, v); }} />
              </div>
            )}
            <div onClick={() => setVenueFee(v => !v)} style={{ width: "44px", height: "24px", borderRadius: "12px", background: venueFee ? theme.accent : theme.border, position: "relative", cursor: "pointer", flexShrink: 0 }}>
              <div style={{ width: "20px", height: "20px", borderRadius: "50%", background: "#fff", position: "absolute", top: "2px", left: venueFee ? "22px" : "2px", transition: "left 0.2s" }} />
            </div>
          </div>}

          {rounds.length > 0 && (() => {
            const VENUE_FEE_PER_ROUND = venueFeeAmt;
            const pm = {};
            rounds.forEach(r => r.players.forEach(p => { if (p.active && !pm[p.id]) pm[p.id] = { id: p.id, name: p.name }; }));
            const pt = Object.values(pm).map(pl => {
              const roundProfit = rounds.reduce((s, r) => { const rp = r.players.find(p => p.id === pl.id); return s + (rp && rp.active ? rp.profitCash : 0); }, 0);
              const roundsPlayed = rounds.filter(r => r.players.some(p => p.id === pl.id && p.active)).length;
              const fee = venueFee ? roundsPlayed * VENUE_FEE_PER_ROUND : 0;
              return { ...pl, total: roundProfit - fee, fee, roundsPlayed };
            });
            const sorted = [...pt].sort((a, b) => nameSort(a.name, b.name));
            const totalFee = sorted.reduce((a, p) => a + p.fee, 0);
            const cb = `1px solid ${theme.border}55`, hBg = "#0d1a14", cp = "4px 5px";

            return (<>
              <div style={{ ...S.card, padding: 0, overflow: "hidden" }}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
                    <thead>
                      <tr>
                        <th style={{ padding: cp, paddingLeft: "6px", textAlign: "left", fontSize: "10px", color: theme.textDim, fontWeight: 600, background: hBg, borderBottom: cb, borderRight: cb, position: "sticky", left: 0, zIndex: 3 }}>玩家</th>
                        {rounds.map((r, ri) => <th key={r.id} onClick={() => editRound(ri)} style={{ padding: cp, textAlign: "right", fontSize: "10px", color: theme.accent, fontWeight: 600, background: hBg, borderBottom: cb, borderRight: cb, whiteSpace: "nowrap", cursor: "pointer", textDecoration: "underline" }}>{r.id}</th>)}
                        <th style={{ padding: cp, textAlign: "right", fontSize: "10px", color: theme.gold, fontWeight: 700, background: hBg, borderBottom: cb, whiteSpace: "nowrap" }}>小計</th>
                      </tr>
                    </thead>
                    <tbody>
                      {sorted.map((pl, pi) => {
                        const bg = pi % 2 === 0 ? theme.card : theme.cardAlt;
                        return (
                          <tr key={pl.id}>
                            <td style={{ padding: cp, paddingLeft: "6px", fontWeight: 700, borderBottom: cb, borderRight: cb, background: bg, overflow: "hidden", whiteSpace: "nowrap", position: "sticky", left: 0, zIndex: 2 }}>{pl.name}</td>
                            {rounds.map(r => { const rp = r.players.find(p => p.id === pl.id); const v = rp && rp.active ? rp.profitCash : null; return <td key={r.id} style={{ padding: cp, textAlign: "right", fontWeight: 500, fontVariantNumeric: "tabular-nums", borderBottom: cb, borderRight: cb, color: v === null ? "transparent" : v > 0 ? theme.accent : v < 0 ? theme.red : theme.textDim, whiteSpace: "nowrap" }}>{v !== null ? Math.abs(v) : ""}</td>; })}
                            <td style={{ padding: cp, textAlign: "right", fontWeight: 700, fontVariantNumeric: "tabular-nums", borderBottom: cb, color: pl.total > 0 ? theme.accent : pl.total < 0 ? theme.red : theme.textDim, whiteSpace: "nowrap" }}>{pl.total}</td>
                          </tr>
                        );
                      })}
                      <tr>
                        <td style={{ padding: cp, paddingLeft: "6px", fontWeight: 600, color: theme.textDim, fontSize: "10px", background: hBg, borderRight: cb, position: "sticky", left: 0, zIndex: 2 }}>驗算</td>
                        {rounds.map(r => { const t = r.players.filter(p => p.active).reduce((a, p) => a + p.profitCash, 0); return <td key={r.id} style={{ padding: cp, textAlign: "right", fontWeight: 600, fontVariantNumeric: "tabular-nums", borderRight: cb, color: t === 0 ? theme.accent : theme.red }}>{t}</td>; })}
                        <td style={{ padding: cp, textAlign: "right", fontWeight: 700, fontVariantNumeric: "tabular-nums", color: venueFee ? "#f39c12" : theme.textDim, fontSize: venueFee ? "10px" : "11px" }}>{venueFee ? "場地費$" + totalFee : sorted.reduce((a, p) => a + p.total, 0)}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>

              <div style={{ display: "flex", justifyContent: "flex-end", gap: "10px", marginTop: "6px", fontSize: "10px" }}>
                <span><span style={{ color: theme.accent }}>■</span> 贏</span>
                <span><span style={{ color: theme.red }}>■</span> 輸</span>
              </div>

              {venueFee && (() => {
                const grouped = {};
                sorted.forEach(p => { const k = p.roundsPlayed; if (!grouped[k]) grouped[k] = []; grouped[k].push(p); });
                const keys = Object.keys(grouped).sort((a, b) => b - a);
                return (
                  <div style={{ marginTop: "12px", padding: "12px 14px", background: "#f39c1211", border: "1px solid #f39c1222", borderRadius: "10px" }}>
                    <div style={{ fontSize: "12px", color: "#f39c12", fontWeight: 600, marginBottom: "8px" }}>🏠 場地費明細</div>
                    {keys.map(k => (
                      <div key={k} style={{ marginBottom: "6px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: "11px" }}>
                          <span style={{ color: theme.text }}>{grouped[k].map(p => p.name).join("、")}</span>
                        </div>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: "11px" }}>
                          <span style={{ color: theme.textDim }}>× {k} 局</span>
                          <span style={{ color: "#f39c12" }}>-${k * VENUE_FEE_PER_ROUND} / 人</span>
                        </div>
                      </div>
                    ))}
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: "8px", paddingTop: "8px", borderTop: "1px solid #f39c1233" }}>
                      <span style={{ fontSize: "12px", color: "#f39c12", fontWeight: 600 }}>場主收入</span>
                      <span style={{ fontSize: "16px", fontWeight: 700, color: "#f39c12" }}>${totalFee}</span>
                    </div>
                  </div>
                );
              })()}
            </>);
          })()}
          </div>

          <div style={{ display: "flex", gap: "10px", marginTop: "16px" }}>
            <button style={{ ...S.btn(theme.accent), flex: 1, padding: "14px", fontSize: "15px" }} onClick={() => setView("setup")}>♠ 設定第 {rounds.length + 1} 局</button>
          </div>
          <button style={{ ...S.btn("#9b59b6"), width: "100%", marginTop: "10px", padding: "10px", fontSize: "13px" }} onClick={shareImage}>📷 分享戰績圖</button>
          <button style={{ ...S.btn(theme.red, true), width: "100%", marginTop: "10px", padding: "10px", fontSize: "13px" }} onClick={resetAll}>重置所有紀錄</button>
        </>)}

        {toast && (
          <div style={{ position: "fixed", top: "50%", left: "50%", transform: "translate(-50%, -50%)", padding: "24px 32px", borderRadius: "16px", background: "rgba(0,0,0,0.9)", color: "#fff", textAlign: "center", zIndex: 100, boxShadow: "0 8px 32px rgba(0,0,0,0.5)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)" }}>
            <div style={{ fontSize: "32px", marginBottom: "8px" }}>{toast === "capturing" ? "📷" : toast === "exported" ? "📤" : toast === "imported" ? "📥" : "❌"}</div>
            <div style={{ fontSize: "16px", fontWeight: 700 }}>{toast === "capturing" ? "產生圖片中..." : toast === "exported" ? "已複製到剪貼簿" : toast === "imported" ? "匯入成功" : "操作失敗"}</div>
            {toast === "exported" && <div style={{ fontSize: "13px", color: "#aaa", marginTop: "4px" }}>傳給接手的人貼上即可</div>}
          </div>
        )}

        {showStats && (() => {
          const allRecords = loadStats();
          const filtered = allRecords.filter(r => {
            if (statsDateFrom && r.date < statsDateFrom) return false;
            if (statsDateTo && r.date > statsDateTo) return false;
            return true;
          });
          const entries = aggregateStats(filtered);
          const sorted = [...entries].sort((a, b) => statsSortBy === "avg" ? b.avg - a.avg : b.totalCash - a.totalCash);
          const tabStyle = (active) => ({ flex: 1, padding: "8px", borderRadius: "8px", border: "none", fontSize: "12px", fontWeight: 600, cursor: "pointer", background: active ? "#2ecc71" : "transparent", color: active ? "#000" : "#7a8a80" });
          const hasFilter = statsDateFrom || statsDateTo;
          const allDates = [...new Set(allRecords.map(r => r.date))].sort();
          return (
            <div className="stats-overlay" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", zIndex: 200, overflow: "auto", paddingLeft: "20px", paddingRight: "20px", paddingBottom: "20px" }}>
              <div style={{ maxWidth: "500px", margin: "0 auto" }}>
                <div ref={statsRef} style={{ background: "#0a0f0d", padding: "16px", borderRadius: "12px" }}>
                  <h2 style={{ fontSize: "20px", fontWeight: 700, marginBottom: "16px" }}>🏆 累積戰績排名</h2>
                  {!isCapturing && <div style={{ display: "flex", gap: "4px", padding: "3px", background: "#1a1a1a", borderRadius: "10px", marginBottom: "10px" }}>
                    <button style={tabStyle(statsSortBy === "avg")} onClick={() => setStatsSortBy("avg")}>場均排名</button>
                    <button style={tabStyle(statsSortBy === "total")} onClick={() => setStatsSortBy("total")}>總盈虧排名</button>
                  </div>}
                  {isCapturing && <div style={{ fontSize: "12px", color: "#7a8a80", marginBottom: "10px" }}>依{statsSortBy === "avg" ? "場均" : "總盈虧"}排名{hasFilter ? " (" + (statsDateFrom || "起始") + " ~ " + (statsDateTo || "至今") + ")" : ""}</div>}
                  {!isCapturing && <div style={{ display: "flex", gap: "6px", alignItems: "center", marginBottom: "14px", fontSize: "12px" }}>
                    <input type="date" value={statsDateFrom} onChange={e => setStatsDateFrom(e.target.value)} style={{ flex: 1, background: "#1a1a1a", border: "1px solid #333", borderRadius: "6px", color: "#e8e6e3", padding: "6px 8px", fontSize: "12px" }} />
                    <span style={{ color: "#7a8a80" }}>~</span>
                    <input type="date" value={statsDateTo} onChange={e => setStatsDateTo(e.target.value)} style={{ flex: 1, background: "#1a1a1a", border: "1px solid #333", borderRadius: "6px", color: "#e8e6e3", padding: "6px 8px", fontSize: "12px" }} />
                    {hasFilter && <button style={{ background: "transparent", border: "none", color: "#e74c3c", fontSize: "14px", cursor: "pointer", padding: "0 4px" }} onClick={() => { setStatsDateFrom(""); setStatsDateTo(""); }}>✕</button>}
                  </div>}
                  {hasFilter && isCapturing && <div style={{ fontSize: "11px", color: "#7a8a80", marginBottom: "8px" }}>{statsDateFrom || "起始"} ~ {statsDateTo || "至今"}</div>}
                  {sorted.length === 0
                    ? <p style={{ color: "#7a8a80", textAlign: "center", padding: "40px 0" }}>尚無累積紀錄</p>
                    : <div style={{ background: "#141e19", border: "1px solid #2a3a30", borderRadius: "10px", overflow: "hidden" }}>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "13px" }}>
                          <thead>
                            <tr style={{ background: "#0d1a14" }}>
                              <th style={{ padding: "8px 6px", textAlign: "left", color: "#7a8a80", fontWeight: 600, fontSize: "11px" }}>#</th>
                              <th style={{ padding: "8px 6px", textAlign: "left", color: "#7a8a80", fontWeight: 600, fontSize: "11px" }}>玩家</th>
                              <th style={{ padding: "8px 6px", textAlign: "right", color: statsSortBy === "avg" ? "#f1c40f" : "#7a8a80", fontWeight: 600, fontSize: "11px" }}>場均</th>
                              <th style={{ padding: "8px 6px", textAlign: "right", color: statsSortBy === "total" ? "#f1c40f" : "#7a8a80", fontWeight: 600, fontSize: "11px" }}>總計</th>
                              <th style={{ padding: "8px 6px", textAlign: "right", color: "#7a8a80", fontWeight: 600, fontSize: "11px" }}>場次</th>
                            </tr>
                          </thead>
                          <tbody>
                            {sorted.map((e, i) => (
                              <tr key={e.name} style={{ background: i % 2 === 0 ? "#141e19" : "#1a2a22" }}>
                                <td style={{ padding: "8px 6px", color: i === 0 ? "#f1c40f" : "#7a8a80", fontWeight: 600 }}>{i + 1}</td>
                                <td style={{ padding: "8px 6px", fontWeight: 600 }}>{e.name}</td>
                                <td style={{ padding: "8px 6px", textAlign: "right", fontWeight: statsSortBy === "avg" ? 700 : 500, fontVariantNumeric: "tabular-nums", color: e.avg > 0 ? "#2ecc71" : e.avg < 0 ? "#e74c3c" : "#7a8a80" }}>{e.avg > 0 ? "+" : ""}{e.avg}</td>
                                <td style={{ padding: "8px 6px", textAlign: "right", fontWeight: statsSortBy === "total" ? 700 : 500, fontVariantNumeric: "tabular-nums", color: e.totalCash > 0 ? "#2ecc71" : e.totalCash < 0 ? "#e74c3c" : "#7a8a80" }}>{e.totalCash > 0 ? "+" : ""}{e.totalCash}</td>
                                <td style={{ padding: "8px 6px", textAlign: "right", color: "#7a8a80" }}>{e.sessions}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                  }
                </div>
                <div style={{ display: "flex", gap: "8px", marginTop: "12px" }}>
                  <button style={{ flex: 1, padding: "10px", borderRadius: "8px", background: "#9b59b6", color: "#fff", border: "none", fontSize: "13px", fontWeight: 600, cursor: "pointer" }} onClick={shareStatsImage}>📷 分享排名圖</button>
                  <button style={{ flex: 1, padding: "10px", borderRadius: "8px", background: "transparent", border: "1px solid #555", color: "#aaa", fontSize: "13px", cursor: "pointer" }} onClick={() => setShowStats(false)}>關閉</button>
                </div>
                <div style={{ display: "flex", gap: "8px", marginTop: "8px" }}>
                  <button style={{ flex: 1, padding: "10px", borderRadius: "8px", background: "transparent", border: "1px solid " + theme.accent + "44", color: theme.accent, fontSize: "12px", cursor: "pointer" }} onClick={async () => {
                    const data = JSON.stringify(loadStats());
                    try { await navigator.clipboard.writeText(data); setToast("exported"); setTimeout(() => setToast(""), 2000); } catch { setToast("error"); setTimeout(() => setToast(""), 2000); }
                  }}>📤 匯出排名</button>
                  <button style={{ flex: 1, padding: "10px", borderRadius: "8px", background: "transparent", border: "1px solid " + theme.accent + "44", color: theme.accent, fontSize: "12px", cursor: "pointer" }} onClick={() => setShowStatsImport(v => !v)}>📥 匯入排名</button>
                </div>
                {showStatsImport && (
                  <div style={{ marginTop: "8px" }}>
                    <textarea style={{ width: "100%", height: "70px", background: "#1a1a1a", border: "1px solid #333", borderRadius: "6px", color: "#e8e6e3", fontFamily: "monospace", fontSize: "10px", padding: "6px 8px", resize: "none", outline: "none" }} value={statsImportText} onChange={e => setStatsImportText(e.target.value)} placeholder="貼上匯出的排名資料..." />
                    <div style={{ display: "flex", gap: "6px", marginTop: "6px" }}>
                      <button style={{ flex: 1, padding: "8px", borderRadius: "6px", background: theme.accent, color: "#fff", border: "none", fontSize: "12px", fontWeight: 600, cursor: "pointer" }} onClick={() => {
                        try {
                          const imported = JSON.parse(statsImportText.trim());
                          if (!Array.isArray(imported)) { alert("資料格式錯誤"); return; }
                          if (!confirm("匯入會將排名資料合併（不覆蓋），確定嗎？")) return;
                          const existing = loadStats();
                          saveStats([...existing, ...imported]);
                          setShowStatsImport(false); setStatsImportText("");
                          setShowStats(false); setTimeout(() => setShowStats(true), 100);
                        } catch { alert("資料格式錯誤，請確認貼上的內容"); }
                      }}>確認匯入</button>
                      <button style={{ flex: 1, padding: "8px", borderRadius: "6px", background: "transparent", border: "1px solid #555", color: "#aaa", fontSize: "12px", cursor: "pointer" }} onClick={() => { setShowStatsImport(false); setStatsImportText(""); }}>取消</button>
                    </div>
                  </div>
                )}
                <div style={{ display: "flex", gap: "8px", marginTop: "8px" }}>
                  <button style={{ flex: 1, padding: "10px", borderRadius: "8px", background: "transparent", border: "1px solid #e74c3c44", color: "#e74c3c", fontSize: "12px", cursor: "pointer" }} onClick={() => { if (confirm("確定要清除所有累積戰績？此操作不可復原。")) { localStorage.removeItem("poker-stats"); localStorage.removeItem("poker-stats-session"); setShowStats(false); setTimeout(() => setShowStats(true), 100); } }}>清除所有累積</button>
                </div>
                <p style={{ color: "#555", fontSize: "10px", textAlign: "center", marginTop: "12px" }}>點擊標題 ♠ 開啟此頁面</p>
              </div>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
